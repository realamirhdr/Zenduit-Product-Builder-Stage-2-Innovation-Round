document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

           <span style=\"font-size:12px;color:oklch(0.58 0.02 255);\">· editable<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"flex:none;padding:0 20px;\">\n                    <textarea value=\"{{ coachNote }}\" onchange=\"{{ onNoteChange }}\" style=\"width:100%;height:176px;resize:none;border:1px solid oklch(0.9 0.008 255);border-radius:11px;padding:13px 14px;font-family:inherit;font-size:13px;line-height:1.55;color:oklch(0.3 0.02 260);outline:none;box-sizing:border-box;\"><\u002Ftextarea>\n                  <\u002Fdiv>\n                  <div style=\"flex:none;padding:13px 20px 6px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:oklch(0.58 0.02 255);\">Revise with the assistant<\u002Fdiv>\n                  <div style=\"flex:1;overflow:auto;padding:0 20px;display:flex;flex-direction:column;gap:8px;\">\n                    <sc-for list=\"{{ chatMsgs }}\" as=\"m\" hint-placeholder-count=\"1\">\n                      <div style=\"{{ m.rowStyle }}\"><div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"flex:none;display:flex;gap:8px;padding:10px 20px 16px;border-top:1px solid oklch(0.95 0.004 255);\">\n                    <input value=\"{{ chatInput }}\" onchange=\"{{ onChatInput }}\" onkeydown=\"{{ onChatKey }}\" placeholder=\"e.g. make it shorter, warmer, or more direct\" style=\"flex:1;height:40px;border:1px solid oklch(0.9 0.008 255);border-radius:10px;padding:0 13px;font-family:inherit;font-size:13px;color:oklch(0.3 0.02 260);outline:none;\">\n                    <button onclick=\"{{ sendChat }}\" style=\"height:40px;padding:0 17px;border:none;border-radius:10px;background:oklch(0.52 0.15 255);color:#fff;font-size:13px;font-weight:600;cursor:pointer;flex:none;\" style-hover=\"background:oklch(0.47 0.15 255);\">Revise<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n\n          <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-top:1px solid oklch(0.94 0.006 255);background:oklch(0.985 0.003 255);\">\n            <button onclick=\"{{ closeModal }}\" style=\"height:40px;padding:0 16px;border:1px solid oklch(0.9 0.008 255);border-radius:10px;background:#fff;color:oklch(0.42 0.02 260);font-size:13px;font-weight:600;cursor:pointer;\" style-hover=\"background:oklch(0.96 0.006 255);\">Cancel<\u002Fbutton>\n            <sc-if value=\"{{ isGeneral }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ setTabCoaching }}\" style=\"height:40px;padding:0 20px;border:none;border-radius:10px;background:oklch(0.52 0.15 255);color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;\" style-hover=\"background:oklch(0.47 0.15 255);\">Draft coaching <span style=\"font-size:14px;\">→<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isCoaching }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ deliver }}\" style=\"height:40px;padding:0 20px;border:none;border-radius:10px;background:oklch(0.52 0.15 255);color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;\" style-hover=\"background:oklch(0.47 0.15 255);\"><span style=\"width:7px;height:7px;border-radius:999px;background:#fff;\"><\u002Fspan>{{ sendLabel }}<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:40;display:flex;align-items:center;gap:10px;background:oklch(0.27 0.03 255);color:#fff;padding:12px 18px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:0 12px 30px oklch(0.2 0.05 255 / 0.35);\">\n        <span style=\"width:18px;height:18px;border-radius:999px;background:oklch(0.6 0.13 155);display:grid;place-items:center;font-size:11px;\">✓<\u002Fspan>{{ toast }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { variation: 'A', drawerOpen: false, scale: 1, modalOpen: false, activeEvent: null, modalTab: 'general', channel: 'email', coachNote: '', chatInput: '', chatMsgs: [], toast: null, statusOverrides: {} };\n\n  measure() {\n    const avail = Math.min(1280, (window.innerWidth || 1280) - 52);\n    const s = Math.max(0.1, avail / 1280);\n    if (Math.abs(s - (this.state.scale || 1)) > 0.002) this.setState({ scale: s });\n  }\n\n  componentDidMount() {\n    this._measure = () => this.measure();\n    requestAnimationFrame(this._measure);\n    setTimeout(this._measure, 60);\n    window.addEventListener('resize', this._measure);\n  }\n\n  componentWillUnmount() {\n    if (this._measure) window.removeEventListener('resize', this._measure);\n    clearTimeout(this._toastT);\n  }\n\n  openModal(o) {\n    this.setState({\n      modalOpen: true, activeEvent: o, modalTab: 'general', channel: 'email',\n      coachNote: this.noteFor(o, 'default'), chatInput: '',\n      chatMsgs: [{ role: 'assistant', text: 'I drafted this note from the event details. Want it shorter, warmer, or more direct? Just ask.' }],\n    });\n  }\n\n  recFor(type) {\n    return ({\n      'Collision warning': \"Let's build in a little more following distance and ease off the throttle earlier on approach.\",\n      'Phone use': 'A quick reminder to keep the phone stowed and hands-free while the vehicle is moving.',\n      'Fatigue signs': \"Let's look at your break cadence and make sure your rest stops are actually working for you.\",\n      'Harsh braking': 'Scanning a few seconds further ahead will help you slow down sooner and brake more gently.',\n      'Tailgating': 'Aim for a three-second gap to the vehicle ahead — it gives you much more room to react.',\n      'Speeding': \"Let's keep it at or under the posted limit; flag me if the route timing ever feels too tight.\",\n      'Rolling stop': 'A full stop at marked intersections keeps you predictable for everyone around you.',\n    })[type] || \"Let's review the clip together and talk it through.\";\n  }\n\n  riskFor(ev) {\n    const lvl = ev.band === 'Critical' ? 'High' : (ev.band === 'High' ? 'Elevated' : 'Moderate');\n    const alert = ev.inCab ? 'An in-cab audio alert already fired during the event.' : 'No in-cab alert fired, so the driver may not be aware of it.';\n    return lvl + ' risk. ' + alert + ' Model confidence is ' + ev.confText + '.';\n  }\n\n  noteFor(ev, tone) {\n    const first = (ev.driver || 'there').split(' ')[0];\n    const tl = (ev.type || 'safety').toLowerCase();\n    const ctx = ({\n      'Collision warning': 'a forward-collision warning at ' + ev.speed + ' mph',\n      'Phone use': 'handheld phone use while the vehicle was moving',\n      'Fatigue signs': 'fatigue indicators during an overnight stretch',\n      'Harsh braking': 'a harsh-braking event at ' + ev.gText,\n      'Tailgating': 'following distance below a safe threshold',\n      'Speeding': ev.speed + ' mph in a ' + ev.limit + ' mph zone',\n      'Rolling stop': 'a rolling stop at a marked intersection',\n    })[ev.type] || ('a ' + tl + ' event');\n    const rec = this.recFor(ev.type);\n    if (tone === 'short') {\n      return 'Hi ' + first + ' — quick note on ' + ctx + ' flagged ' + ev.time + ' on ' + ev.vehicle + '. ' + rec + \" Let's take five minutes at your next check-in. Thanks!\\n– Sam\";\n    }\n    if (tone === 'warm') {\n      return 'Hi ' + first + ',\\n\\nFirst off, thank you for the care you put in out there every day. I wanted to share something the Safety Inbox noticed on ' + ev.time + ': ' + ctx + ' on ' + ev.vehicle + '. ' + rec + \"\\n\\nThere's nothing to worry about — no points, no penalty. Just a friendly heads-up so we can keep you safe. Happy to watch the clip together whenever works for you.\\n\\nWarmly,\\nSam\";\n    }\n    if (tone === 'firm') {\n      return 'Hi ' + first + ',\\n\\nOn ' + ev.time + ' the system recorded ' + ctx + ' on ' + ev.vehicle + '. This falls outside our safe-driving policy and needs to be addressed.\\n\\n' + rec + ' Please confirm you have reviewed this note; we will follow up to verify the behavior has changed.\\n\\nRegards,\\nSam Morgan\\nSafety Team';\n    }\n    return 'Hi ' + first + ',\\n\\nThanks for everything you do on the road. On ' + ev.time + ' the Safety Inbox flagged ' + ctx + ' on ' + ev.vehicle + '. ' + rec + \"\\n\\nNo points or penalties here — this is just a quick heads-up so we can keep you and everyone around you safe. Reply if you saw it differently; I'm happy to review the footage with you.\\n\\n– Sam Morgan, Safety Team\";\n  }\n\n  sendChat() {\n    const p = (this.state.chatInput || '').trim();\n    if (!p) return;\n    const ae = this.state.activeEvent;\n    let tone = 'reworded', reply = 'Reworded the draft above — take a look.';\n    if (/short|brief|concise|tighten|trim/i.test(p)) { tone = 'short'; reply = 'Tightened it down to just a couple of lines.'; }\n    else if (/warm|friend|kind|nice|soft|appreciat/i.test(p)) { tone = 'warm'; reply = 'Warmed up the tone and added a little appreciation.'; }\n    else if (/firm|serious|direct|strict|policy|strong|formal/i.test(p)) { tone = 'firm'; reply = 'Made it more direct and referenced the safety policy.'; }\n    const note = this.noteFor(ae, tone);\n    this.setState((s) => ({\n      chatInput: '', coachNote: note,\n      chatMsgs: s.chatMsgs.concat([{ role: 'user', text: p }, { role: 'assistant', text: reply }]),\n    }));\n  }\n\n  deliver() {\n    const ae = this.state.activeEvent;\n    if (!ae) return;\n    const word = this.state.channel === 'email' ? 'email' : 'message';\n    this.setState((s) => ({\n      modalOpen: false,\n      toast: 'Coaching note sent to ' + ae.driver + ' via ' + word,\n      statusOverrides: Object.assign({}, s.statusOverrides, { [ae.id]: 'Coaching sent' }),\n    }));\n    clearTimeout(this._toastT);\n    this._toastT = setTimeout(() => this.setState({ toast: null }), 3000);\n  }\n\n  data() {\n    const COACH = {\n      'Collision warning': 'Forward-collision alert at low speed — recommend a following-distance refresher and route review.',\n      'Phone use': 'Handheld device detected for 7s — send the distracted-driving policy reminder and confirm acknowledgement.',\n      'Fatigue signs': 'Eyelid-closure pattern flagged at 2am — schedule a fatigue check-in and review the overnight route.',\n      'Harsh braking': 'Hard stop above threshold — coach on scanning further ahead and decelerating earlier.',\n      'Tailgating': 'Headway under 1.2s — share the 3-second following-distance guidance and recognise improvement.',\n      'Speeding': 'Sustained over the posted limit — confirm the route timing, then recognise the pattern with the driver.',\n      'Rolling stop': 'No complete stop at the intersection — quick reminder on full stops; low priority to batch.',\n    };\n    const rows = [\n      { id: 'EV-4471', type: 'Collision warning', score: 96, conf: 94, driver: 'Marcus Bell',    vehicle: 'VAN-118',  time: 'Mon 7:42a',  speed: 38, limit: 35, g: 0.00, inCab: true,  status: 'New' },\n      { id: 'EV-4468', type: 'Phone use',         score: 91, conf: 88, driver: 'Dana Whitfield',  vehicle: 'TRK-2284', time: 'Mon 6:15a',  speed: 62, limit: 55, g: 0.00, inCab: false, status: 'New' },\n      { id: 'EV-4462', type: 'Fatigue signs',     score: 88, conf: 79, driver: 'Luis Romero',     vehicle: 'TRK-2310', time: 'Tue 2:08a',  speed: 60, limit: 60, g: 0.00, inCab: true,  status: 'New' },\n      { id: 'EV-4459', type: 'Harsh braking',     score: 81, conf: 92, driver: 'Priya Nair',      vehicle: 'VAN-204',  time: 'Tue 4:51p',  speed: 41, limit: 35, g: 0.62, inCab: true,  status: 'Triaged' },\n      { id: 'EV-4455', type: 'Tailgating',        score: 74, conf: 83, driver: 'Sam Okafor',      vehicle: 'TRK-2055', time: 'Wed 9:20a',  speed: 70, limit: 65, g: 0.00, inCab: false, status: 'New' },\n      { id: 'EV-4451', type: 'Speeding',          score: 68, conf: 97, driver: 'Carlos Mendez',   vehicle: 'VAN-118',  time: 'Wed 1:30p',  speed: 78, limit: 65, g: 0.00, inCab: true,  status: 'Coaching sent' },\n      { id: 'EV-4447', type: 'Rolling stop',      score: 61, conf: 86, driver: 'Aisha Khan',      vehicle: 'VAN-309',  time: 'Thu 8:05a',  speed: 12, limit: 0,  g: 0.00, inCab: false, status: 'Coaching sent' },\n      { id: 'EV-4440', type: 'Harsh braking',     score: 52, conf: 90, driver: 'Tom Becker',      vehicle: 'TRK-2310', time: 'Thu 5:44p',  speed: 33, limit: 30, g: 0.55, inCab: true,  status: 'Verified' },\n      { id: 'EV-4436', type: 'Tailgating',        score: 47, conf: 80, driver: 'Priya Nair',      vehicle: 'VAN-204',  time: 'Fri 11:12a', speed: 58, limit: 55, g: 0.00, inCab: false, status: 'Verified' },\n      { id: 'EV-4431', type: 'Speeding',          score: 39, conf: 76, driver: 'Sam Okafor',      vehicle: 'TRK-2055', time: 'Fri 3:27p',  speed: 71, limit: 65, g: 0.00, inCab: true,  status: 'Disputed' },\n    ];\n    const band = (s) => s >= 85 ? 'Critical' : s >= 65 ? 'High' : 'Medium';\n    const sev = {\n      Critical: { fg: 'oklch(0.56 0.18 27)', bg: 'oklch(0.95 0.045 27)' },\n      High:     { fg: 'oklch(0.62 0.14 58)', bg: 'oklch(0.95 0.05 72)' },\n      Medium:   { fg: 'oklch(0.54 0.05 255)', bg: 'oklch(0.95 0.015 255)' },\n    };\n    const stat = {\n      'New':           { fg: 'oklch(0.50 0.15 255)', bg: 'oklch(0.95 0.035 255)' },\n      'Triaged':       { fg: 'oklch(0.46 0.02 260)', bg: 'oklch(0.94 0.006 260)' },\n      'Coaching sent': { fg: 'oklch(0.48 0.14 300)', bg: 'oklch(0.95 0.04 305)' },\n      'Verified':      { fg: 'oklch(0.50 0.12 155)', bg: 'oklch(0.94 0.05 158)' },\n      'Disputed':      { fg: 'oklch(0.56 0.15 48)',  bg: 'oklch(0.95 0.06 60)' },\n    };\n    const ov = this.state.statusOverrides || {};\n    return rows.map((e, i) => {\n      const b = band(e.score);\n      const c = sev[b];\n      const st = ov[e.id] || e.status;\n      const s = stat[st];\n      const over = e.speed - e.limit;\n      const o = Object.assign({}, e, {\n        status: st,\n        rank: i + 1,\n        band: b,\n        scoreText: String(e.score),\n        confText: e.conf + '%',\n        speedText: e.speed + ' / ' + e.limit,\n        overText: e.type === 'Rolling stop' ? 'no stop' : (over > 0 ? '+' + over + ' over' : 'within'),\n        gText: e.g > 0 ? e.g.toFixed(2) + ' g' : '—',\n        initials: e.driver.split(' ').map(x => x[0]).join(''),\n        coachDraft: COACH[e.type] || 'Review the clip and confirm the flagged behavior before coaching.',\n        inCabText: e.inCab ? 'In-cab alert fired' : 'No in-cab alert',\n        sevDotStyle: { width: '9px', height: '9px', borderRadius: '3px', background: c.fg, flex: 'none' },\n        urgBadgeStyle: { display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '3px 9px', borderRadius: '999px', background: c.bg, color: c.fg, fontSize: '11px', fontWeight: '700', letterSpacing: '.02em', whiteSpace: 'nowrap' },\n        barTrackStyle: { width: '52px', height: '6px', borderRadius: '999px', background: 'oklch(0.92 0.006 255)', overflow: 'hidden', flex: 'none' },\n        barFillStyle: { width: e.score + '%', height: '100%', background: c.fg, borderRadius: '999px' },\n        meterFillStyle: { position: 'absolute', left: 0, bottom: 0, width: '100%', height: e.score + '%', background: c.fg },\n        statusStyle: { display: 'inline-flex', alignItems: 'center', gap: '7px', padding: '4px 11px', borderRadius: '999px', background: s.bg, color: s.fg, fontSize: '12px', fontWeight: '600', whiteSpace: 'nowrap' },\n        statusDotStyle: { width: '6px', height: '6px', borderRadius: '999px', background: s.fg, flex: 'none' },\n        inCabStyle: { display: 'inline-flex', alignItems: 'center', gap: '5px', fontSize: '11px', fontWeight: '600', color: e.inCab ? 'oklch(0.52 0.12 155)' : 'oklch(0.6 0.02 255)' },\n        inCabDotStyle: { width: '6px', height: '6px', borderRadius: '999px', flex: 'none', background: e.inCab ? 'oklch(0.55 0.12 155)' : 'oklch(0.8 0.01 255)' },\n        inCabChipStyle: { fontSize: '11px', fontWeight: '600', padding: '4px 8px', borderRadius: '7px', whiteSpace: 'nowrap', color: e.inCab ? 'oklch(0.46 0.11 155)' : 'oklch(0.55 0.02 255)', background: e.inCab ? 'oklch(0.95 0.04 158)' : 'oklch(0.97 0.004 255)', border: e.inCab ? '1px solid oklch(0.9 0.05 158)' : '1px solid oklch(0.93 0.006 255)' },\n      });\n      o.openReview = () => this.openModal(o);\n      return o;\n    });\n  }\n\n  renderVals() {\n    const v = this.state.variation;\n    const open = this.state.drawerOpen;\n    const s = this.state.scale || 1;\n    const events = this.data();\n\n    const bandMeta = {\n      Critical: { title: 'Critical — act now', desc: 'Highest-urgency events flagged for immediate coaching.', fg: 'oklch(0.56 0.18 27)', bg: 'oklch(0.96 0.04 27)' },\n      High:     { title: 'High priority',      desc: 'Coach this week — clear pattern or elevated risk.',     fg: 'oklch(0.62 0.14 58)', bg: 'oklch(0.97 0.04 72)' },\n      Medium:   { title: 'Review',             desc: 'Lower urgency — confirm, batch, or auto-close once verified.', fg: 'oklch(0.54 0.05 255)', bg: 'oklch(0.97 0.01 255)' },\n    };\n    const groups = ['Critical', 'High', 'Medium'].map((b) => {\n      const items = events.filter((e) => e.band === b);\n      const m = bandMeta[b];\n      return {\n        name: b, title: m.title, desc: m.desc, items, countText: String(items.length),\n        dotStyle: { width: '12px', height: '12px', borderRadius: '4px', background: m.fg, flex: 'none' },\n        countStyle: { display
